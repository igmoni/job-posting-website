services:
  db:
    image: postgres:alpine
    container_name: prismaDB
    restart: always

    environment:
      POSTGRES_DB: prismaDB
      POSTGRES_USER: mohan
      POSTGRES_PASSWORD: mohan123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mohan -d prismaDB"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    container_name: adminerPrismaDB
    restart: always

    ports:
      - "8080:8080"

    depends_on:
      - db

volumes:
  postgres_data:
